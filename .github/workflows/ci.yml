name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8
      - name: Lint (flake8)
        run: |
          echo "Running flake8..."
          flake8
      - name: Run tests
        run: |
          if command -v pytest >/dev/null 2>&1; then pytest -q || true; else echo "pytest not installed or no tests"; fi
