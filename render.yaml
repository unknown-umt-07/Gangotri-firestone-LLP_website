services:
  - type: web
    name: gangotri-firestone-llp
    runtime: python
    # Explicit Python version for Render to use (prevents defaulting to 3.14)
    pythonVersion: 3.11.4
    rootDirectory: website
    # Use a robust build step: call the repository build helper script
    buildCommand: bash render_build.sh
    # Use eventlet worker for Socket.IO compatibility
    startCommand: gunicorn -k eventlet -w 1 app:app
    envVars:
      - key: PYTHON_VERSION
        # Recommend Python 3.11 for binary compatibility with some wheels
        value: 3.11.4
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSCODE
        sync: false
      - key: USE_FIREBASE
        value: "true"
