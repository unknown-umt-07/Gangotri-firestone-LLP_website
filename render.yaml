services:
  - type: web
    name: gangotri-firestone-llp
    runtime: python
    rootDirectory: website
    # Use a robust build step: upgrade packaging tools then install requirements
    # Use '&&' to ensure commands run sequentially in one shell line on Render
    buildCommand: python -m pip install -U pip setuptools wheel && pip install -r requirements.txt
    # Use eventlet worker for Socket.IO compatibility
    startCommand: gunicorn -k eventlet -w 1 app:app
    envVars:
      - key: PYTHON_VERSION
        # Recommend Python 3.11 for binary compatibility with some wheels
        value: 3.11.4
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSCODE
        sync: false
      - key: USE_FIREBASE
        value: "true"
